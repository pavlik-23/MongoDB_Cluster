# ---- Smoketest: upsert de date în DB (idempotent) ----
- name: Upsert document de smoketest (idempotent)
  shell: >
    docker exec {{ container_name }}
    mongosh "mongodb://127.0.0.1:{{ mongo_port }}/smoketest?replicaSet={{ replicaset_name }}"
    --quiet --eval
    '(() => {
      const s = rs.status();
      const primary = (s.members.find(x => x.stateStr === "PRIMARY")?.name) || "";
      const res = db.probe.updateOne(
        { _id: "smoke" },
        { $set: { primary: primary, touched: new Date() } },
        { upsert: true, writeConcern: { w: "majority", wtimeout: 60000 } }
      );
      printjson(res);
      printjson(db.probe.findOne({ _id: "smoke" }));
    })()'
  register: insert_out
  changed_when: >
    insert_out.stdout is search('upsertedCount: 1')
    or insert_out.stdout is search('modifiedCount: 1')
  failed_when: insert_out.rc != 0

- name: Assert upsert reușit
  assert:
    that:
      - insert_out.stdout is search('acknowledged: true')
      - (insert_out.stdout is search('upsertedCount: 1')) or
        (insert_out.stdout is search('modifiedCount: 1'))
    fail_msg: "Smoketest insert/update NU a reușit"
    success_msg: "Smoketest insert/update OK"

- name: Afișează rezultatul smoketest
  debug:
    var: insert_out.stdout_lines
