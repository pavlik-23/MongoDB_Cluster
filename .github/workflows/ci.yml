name: MongoDB Ansible CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job_to_run:
        description: "Choose which manual job to run"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - deploy

env:
  ANSIBLE_PLAYBOOK_CHECK: playbook/check.yaml
  ANSIBLE_PLAYBOOK_DEPLOY: playbook/mongo_deploy.yaml
  ANSIBLE_INVENTORY: inventory/hosts.yml
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "false"

jobs:
  check:
    name: Check
    runs-on: self-hosted
    if: github.event_name == 'push' || github.event.inputs.job_to_run == 'check'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          command -v ssh-agent >/dev/null || sudo apt-get update && sudo apt-get install -y openssh-client
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github_action_key
          chmod 600 ~/.ssh/github_action_key
          ssh-keygen -y -f ~/.ssh/github_action_key > /dev/null
          ssh-add ~/.ssh/github_action_key
          printf "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Show Ansible version
        run: ansible --version

      - name: Show inventory graph
        run: ansible-inventory -i "$ANSIBLE_INVENTORY" --graph

      - name: Install Ansible collections
        run: |
          if [ -f requirements.yml ]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Run check playbook
        run: |
          ansible-playbook "$ANSIBLE_PLAYBOOK_CHECK" \
            -i "$ANSIBLE_INVENTORY"

  mongo_deploy:
    name: Deploy
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_to_run == 'deploy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          command -v ssh-agent >/dev/null || sudo apt-get update && sudo apt-get install -y openssh-client
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github_action_key
          chmod 600 ~/.ssh/github_action_key
          ssh-keygen -y -f ~/.ssh/github_action_key > /dev/null
          ssh-add ~/.ssh/github_action_key
          printf "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Show Ansible version
        run: ansible --version

      - name: Show inventory graph
        run: ansible-inventory -i "$ANSIBLE_INVENTORY" --graph

      - name: Install Ansible collections
        run: |
          if [ -f requirements.yml ]; then
            ansible-galaxy collection install -r requirements.yml
          fi

      - name: Run deploy playbook
        run: |
          ansible-playbook "$ANSIBLE_PLAYBOOK_DEPLOY" \
            -i "$ANSIBLE_INVENTORY"
