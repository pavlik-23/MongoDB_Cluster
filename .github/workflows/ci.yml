name: MongoDB Ansible CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job_to_run:
        description: "Choose which manual job to run"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - deploy

env:
  ANSIBLE_PLAYBOOK_CHECK: ansible-mongo/playbook/check.yaml
  ANSIBLE_PLAYBOOK_DEPLOY: ansible-mongo/playbook/mongo_deploy.yaml
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "False"

jobs:
  check:
    name: Check
    runs-on: self-hosted
    if: github.event_name == 'push' || github.event.inputs.job_to_run == 'check'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Start ssh-agent and add private key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          which ssh-agent || (sudo apt-get update && sudo apt-get install -y openssh-client dnsutils)
          eval "$(ssh-agent -s)"
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Show Ansible version
        run: ansible --version

      - name: Run check playbook
        run: |
          ansible-playbook "$ANSIBLE_PLAYBOOK_CHECK" \
            --inventory-file ansible-mongo/inventory.yml

  mongo_deploy:
    name: Deploy
    runs-on: self-hosted
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_to_run == 'deploy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
     
      - name: Start ssh-agent and add private key
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |   
          which ssh-agent || (sudo apt-get update && sudo apt-get install -y openssh-client dnsutils)
          eval "$(ssh-agent -s)"
          echo "$SSH_PRIVATE_KEY" | tr -d '\r' | ssh-add -
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          cat > ~/.ssh/config <<EOF
          Host *
            StrictHostKeyChecking no
            UserKnownHostsFile /dev/null
          EOF
          chmod 600 ~/.ssh/config

      - name: Install Ansible collections
        run: ansible-galaxy collection install -r ansible-mongo/requirements.yml

      - name: Run deploy playbook
        run: |
          ansible-playbook "$ANSIBLE_PLAYBOOK_DEPLOY" \
            --inventory-file ansible-mongo/inventory.yml
