name: MongoDB Ansible CI

on:
  push:
    branches:
      - main
  workflow_dispatch:
    inputs:
      job_to_run:
        description: "Choose which manual job to run"
        required: true
        default: "check"
        type: choice
        options:
          - check
          - deploy

env:
  ANSIBLE_PLAYBOOK_CHECK: ansible-mongo/playbook/check.yaml
  ANSIBLE_PLAYBOOK_DEPLOY: ansible-mongo/playbook/mongo_deploy.yaml
  ANSIBLE_INVENTORY: ansible-mongo/inventory.yml
  ANSIBLE_FORCE_COLOR: "true"
  ANSIBLE_HOST_KEY_CHECKING: "False"

jobs:
  check:
    name: Check
    runs-on: self-hosted
#    container:
#      image: librespace/ansible:9.13.0
    if: github.event_name == 'push' || github.event.inputs.job_to_run == 'check'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          which ssh-agent || (apk add --no-cache openssh-client bind-tools)
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github_action_key
          chmod 600 ~/.ssh/github_action_key
          ssh-keygen -y -f ~/.ssh/github_action_key > /dev/null
          ssh-add ~/.ssh/github_action_key
          printf "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Show Ansible version
        run: ansible --version

      - name: Run check playbook
        run: |
          ansible-playbook "$ANSIBLE_PLAYBOOK_CHECK" \
            --inventory-file "$ANSIBLE_INVENTORY"

  mongo_deploy:
    name: Deploy
    runs-on: self-hosted
#    container:
#      image: librespace/ansible:9.13.0
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.job_to_run == 'deploy'

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Setup SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SSH_PRIVATE_KEY }}
        run: |
          which ssh-agent || (apk add --no-cache openssh-client bind-tools)
          eval "$(ssh-agent -s)"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "$SSH_PRIVATE_KEY" > ~/.ssh/github_action_key
          chmod 600 ~/.ssh/github_action_key
          ssh-keygen -y -f ~/.ssh/github_action_key > /dev/null
          ssh-add ~/.ssh/github_action_key
          printf "Host *\n\tStrictHostKeyChecking no\n\tUserKnownHostsFile /dev/null\n" > ~/.ssh/config
          chmod 600 ~/.ssh/config

      - name: Install Ansible collections
        run: |
          if [ -f ansible-mongo/requirements.yml ]; then
            ansible-galaxy collection install -r ansible-mongo/requirements.yml
          fi

      - name: Run deploy playbook
        run: |
          ansible-playbook "$ANSIBLE_PLAYBOOK_DEPLOY" \
            --inventory-file "$ANSIBLE_INVENTORY"
